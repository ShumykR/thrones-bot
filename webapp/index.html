<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThroneChat — Карта Вестеросу</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="user-info">
                <span class="role-badge" id="user-role">🛡️ Лорд</span>
                <span class="username" id="user-name">...</span>
            </div>
            <div class="stats-info">
                <div class="stat-badge">
                    <span class="stat-icon">⚔️</span>
                    <span id="army-size">0</span>
                </div>
                <div class="stat-badge">
                    <span class="stat-icon">🏰</span>
                    <span id="castles-count">0</span>
                </div>
            </div>
        </header>

        <main class="content">
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
                <p>Ворони збирають вісті...</p>
            </div>

            <!-- Map View -->
            <section id="view-map" class="view active">
                <h1 class="view-title">Королівство Вестерос</h1>
                <div class="king-banner" id="king-banner" style="display: none;">
                    👑 Король: <strong id="king-name">...</strong>
                </div>
                <div class="castles-grid" id="castles-grid">
                    <!-- Castles rendered here -->
                </div>
            </section>
        </main>

        <!-- Castle Modal -->
        <div id="castle-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-castle-name">Замок</h2>
                    <button class="close-btn" id="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="castle-stat">
                        <span class="label">Володар:</span>
                        <strong class="value" id="modal-owner">...</strong>
                    </div>
                    <div class="castle-stat">
                        <span class="label">Гарнізон:</span>
                        <strong class="value"><span id="modal-garrison">0</span> ⚔️</strong>
                    </div>
                    <div class="castle-stat">
                        <span class="label">Приріст:</span>
                        <strong class="value success">+<span id="modal-income">0</span> / год</strong>
                    </div>
                    
                    <div class="action-section" id="attack-section" style="display: none;">
                        <h3>Штурм замку</h3>
                        <div class="slider-container">
                            <label for="army-slider">Військо для походу: <span id="army-val">100</span></label>
                            <input type="range" id="army-slider" min="100" max="1000" step="10" value="100">
                        </div>
                        <button class="btn btn-primary btn-block" id="btn-attack">⚔️ Відправити військо</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
